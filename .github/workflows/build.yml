name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pyelftools
      - name: Build Firmware
        run: |
          # Прямая попытка запустить сборку
          python3 start_build.py rebuild
      - name: Check output
        run: ls -R project/wifi_mcu_basic_example/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenLN882H_binaries
          path: project/wifi_mcu_basic_example/output/
