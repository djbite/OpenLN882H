name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build
        run: |
          pip install pyelftools
          python3 start_build.py rebuild
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenLN882H_binaries
          path: |
            project/wifi_mcu_basic_example/output/all.bin
            project/wifi_mcu_basic_example/output/ota.bin
